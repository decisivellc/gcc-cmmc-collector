services:
  web:
    build: .
    image: cmmc-gcc-collector:local
    container_name: cmmc-web
    ports:
      - "8080:8080"
    environment:
      CMMC_CONFIG_PATH: /app/data/config.json
      CMMC_OUTPUT_DIR: /app/data/reports
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-}
      CMMC_DEV: ${CMMC_DEV:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./web
          target: /app/web
        - action: sync+restart
          path: ./main.py
          target: /app/main.py
        - action: sync+restart
          path: ./collectors
          target: /app/collectors
        - action: sync+restart
          path: ./mappers
          target: /app/mappers
        - action: sync+restart
          path: ./templates
          target: /app/templates
        - action: sync+restart
          path: ./graph_client.py
          target: /app/graph_client.py
        - action: sync+restart
          path: ./admin_links.py
          target: /app/admin_links.py
        - action: sync+restart
          path: ./attestations.py
          target: /app/attestations.py
        - action: sync+restart
          path: ./critical_findings.py
          target: /app/critical_findings.py
        - action: sync+restart
          path: ./policy_review.py
          target: /app/policy_review.py
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./mappers/nist_800_171_catalog.json
